<!DOCTYPE html>
<html class="dark" dir="rtl" lang="ar">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>بوصلتي — Bosalati</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800;900&family=Tajawal:wght@300;400;500;700;800;900&family=Manrope:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Readex+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/app.css">
</head>
<body class="selection:bg-primary/30 selection:text-on-primary">
    <div class="app-container" id="app" x-data="bosalatiApp()" x-cloak>
        <!-- Ambient Background Glows -->
        <div class="ambient-glow-top"></div>
        <div class="ambient-glow-bottom"></div>

        <!-- Bottom Wave Decoration -->
        <div class="wave-decoration">
            <svg class="w-full" viewBox="0 0 400 120" preserveAspectRatio="none" style="height: 35vh; display: block;">
                <path d="M0,80 C100,20 300,100 400,40 L400,120 L0,120 Z" fill="rgba(27,58,75,0.6)"/>
                <path d="M0,90 C150,40 250,110 400,60 L400,120 L0,120 Z" fill="rgba(59,107,94,0.3)"/>
                <path d="M0,100 C120,70 280,110 400,80 L400,120 L0,120 Z" fill="rgba(139,158,107,0.1)"/>
            </svg>
        </div>

        <!-- Film Grain Overlay -->
        <div class="film-grain"></div>

        <!-- Main Content -->
        <div class="safe-zone relative z-10">

            <!-- ==================== WELCOME SCREEN ==================== -->
            <template x-if="screen === 'welcome'">
                <div class="flex flex-col" style="height:100%;width:100%;">
                    <header class="section-header flex items-center justify-center">
                        <img src="img/4.png" alt="Bosalati AI" style="height: 10vh;">
                    </header>

                    <main class="section-content flex flex-col items-center justify-start overflow-y-auto scroll-hide" style="padding-top: 1vh;">
                        <h1 class="text-vh-xl font-body font-bold text-primary text-center leading-tight animate-fade-in-up" style="margin-bottom: 0.5vh;"
                            x-text="t('welcome_heading')"></h1>
                        <p class="text-vh-base font-body text-center animate-fade-in-up delay-200" style="color: rgba(139,158,107,0.8); margin-bottom: 2vh; max-width: 90%;"
                           x-text="t('welcome_subtitle')"></p>

                        <!-- Hero background with steps -->
                        <div class="relative w-full animate-fade-in-up delay-300 overflow-hidden" style="flex:1;border-radius: 2vh;">
                            <div class="absolute inset-0 z-0">
                                <img src="img/hero.webp" alt="" class="w-full h-full object-cover">
                                <div class="absolute inset-0" style="background: rgba(15, 30, 38, 0.7);"></div>
                            </div>

                            <!-- Horizontal steps -->
                            <div class="absolute left-0 right-0 z-10 flex items-center justify-evenly" style="bottom: 15%; padding: 0 1vh;">
                                <!-- Step 1 -->
                                <div class="flex flex-col items-center text-center" style="max-width: 8vh;">
                                    <div class="flex items-center justify-center" style="width:6vh;height:6vh;border-radius:50%;background:#D4622B;box-shadow:0 0 15px rgba(212,98,43,0.4);">
                                        <span class="material-symbols-rounded filled text-white" style="font-size:3vh;">chat</span>
                                    </div>
                                    <span class="text-on-surface font-bold" style="font-size:1.1vh;line-height:1.3;margin-top:0.3vh;" x-text="t('step_answer_questions')"></span>
                                </div>
                                <span class="material-symbols-rounded" style="font-size:2vh;color:#E8A250;" x-text="locale==='ar'?'arrow_back':'arrow_forward'"></span>
                                <!-- Step 2 -->
                                <div class="flex flex-col items-center text-center" style="max-width: 8vh;">
                                    <div class="flex items-center justify-center" style="width:6vh;height:6vh;border-radius:50%;background:#E8A250;box-shadow:0 0 15px rgba(232,162,80,0.4);">
                                        <span class="material-symbols-rounded filled" style="font-size:3vh;color:#1B3A4B;">auto_awesome</span>
                                    </div>
                                    <span class="text-on-surface font-bold" style="font-size:1.1vh;line-height:1.3;margin-top:0.3vh;" x-text="t('step_discover_career')"></span>
                                </div>
                                <span class="material-symbols-rounded" style="font-size:2vh;color:#8B9E6B;" x-text="locale==='ar'?'arrow_back':'arrow_forward'"></span>
                                <!-- Step 3 -->
                                <div class="flex flex-col items-center text-center" style="max-width: 8vh;">
                                    <div class="flex items-center justify-center" style="width:6vh;height:6vh;border-radius:50%;background:#8B9E6B;box-shadow:0 0 15px rgba(139,158,107,0.4);">
                                        <span class="material-symbols-rounded filled" style="font-size:3vh;color:#1B3A4B;">photo_camera</span>
                                    </div>
                                    <span class="text-on-surface font-bold" style="font-size:1.1vh;line-height:1.3;margin-top:0.3vh;" x-text="t('step_see_yourself')"></span>
                                </div>
                                <span class="material-symbols-rounded" style="font-size:2vh;color:#3B6B5E;" x-text="locale==='ar'?'arrow_back':'arrow_forward'"></span>
                                <!-- Step 4 -->
                                <div class="flex flex-col items-center text-center" style="max-width: 8vh;">
                                    <div class="flex items-center justify-center" style="width:6vh;height:6vh;border-radius:50%;background:#1E3A32;box-shadow:0 0 15px rgba(30,58,50,0.4);">
                                        <span class="material-symbols-rounded filled text-white" style="font-size:3vh;">qr_code_2</span>
                                    </div>
                                    <span class="text-on-surface font-bold" style="font-size:1.1vh;line-height:1.3;margin-top:0.3vh;" x-text="t('step_share_vision')"></span>
                                </div>
                            </div>
                        </div>
                    </main>

                    <footer class="section-footer flex flex-col items-center justify-center" style="gap:1vh;">
                        <button @click="goTo('home')"
                           class="text-white rounded-full border-2 border-primary flex items-center justify-center font-body font-bold pulsing-glow animate-pulse-glow transition-all active:scale-95"
                           style="padding:1.2vh 4vh;font-size:2vh;background:var(--color-primary-container);gap:0.8vh;">
                            <span class="material-symbols-rounded filled" style="font-size:2.2vh;">rocket_launch</span>
                            <span x-text="t('lets_start')"></span>
                        </button>
                        <div class="flex items-center justify-center" style="gap:2vh;">
                            <button @click="toggleLocale()" class="text-vh-xs transition-all flex items-center" style="color:#8B9E6B;gap:0.5vh;">
                                <span class="material-symbols-rounded icon-vh-xs">language</span>
                                <span x-text="locale==='ar'?'English':'العربية'"></span>
                            </button>
                            <button onclick="if(window.DebugLog)DebugLog.toggle();" class="text-vh-xs flex items-center" style="color:#555;gap:0.3vh;">
                                <span class="material-symbols-rounded" style="font-size:1.5vh;">bug_report</span>
                                <span>Debug Log</span>
                            </button>
                        </div>
                    </footer>
                    <div class="pyalara-bar"><img src="img/pyalara logo.png" alt="Pyalara" style="height:3.5vh;"></div>
                </div>
            </template>

            <!-- ==================== HOME / GENDER SCREEN ==================== -->
            <template x-if="screen === 'home'">
                <div class="flex flex-col" style="height:100%;width:100%;">
                    <!-- BG effects -->
                    <div class="absolute inset-0 z-0" style="background:radial-gradient(circle at center top,#1B3A4B 0%,transparent 70%);"></div>
                    <div class="absolute left-0 w-full z-0 animate-scan" style="height:0.3vh;background:linear-gradient(90deg,transparent 0%,rgba(139,158,107,0.15) 50%,transparent 100%);"></div>

                    <header class="section-header flex items-center justify-center relative z-10">
                        <img src="img/4.png" alt="Bosalati AI" style="height: 10vh;">
                    </header>

                    <main class="section-content flex flex-col items-center justify-center relative z-10" style="gap:2vh;">
                        <!-- Before/After -->
                        <div class="flex items-center justify-center animate-fade-in-up" style="gap:2vh;margin-bottom:1vh;">
                            <div class="flex flex-col items-center" style="gap:0.8vh;">
                                <span class="text-vh-lg font-body font-bold uppercase tracking-wider" style="color:#8B9E6B;" x-text="t('before')"></span>
                                <div class="overflow-hidden" style="width:20vh;height:28vh;border-radius:2vh;border:1px solid rgba(255,255,255,0.1);filter:grayscale(1) brightness(0.7);opacity:0.8;">
                                    <img src="img/before.png" alt="Before" class="w-full h-full object-cover">
                                </div>
                            </div>
                            <span class="material-symbols-rounded text-primary animate-pulse" style="font-size:4vh;" x-text="locale==='ar'?'arrow_back':'arrow_forward'"></span>
                            <div class="flex flex-col items-center" style="gap:0.8vh;">
                                <span class="text-vh-lg font-body font-bold text-primary uppercase tracking-wider" x-text="t('after')"></span>
                                <div class="overflow-hidden" style="width:20vh;height:28vh;border-radius:2vh;border:1px solid rgba(212,98,43,0.4);box-shadow:0 0 30px rgba(212,98,43,0.15);">
                                    <img src="img/after.webp" alt="After" class="w-full h-full object-cover">
                                </div>
                            </div>
                        </div>

                        <!-- Gender buttons -->
                        <div class="flex items-center justify-center w-full animate-fade-in-up delay-200" style="gap:2vh;">
                            <button @click="selectGender('male')" class="relative transition-all active:scale-95" style="padding:0.3vh;border-radius:0.75rem;background:linear-gradient(135deg,#D4622B 0%,#5A2810 100%);box-shadow:0 0 25px rgba(212,98,43,0.25);">
                                <div class="flex flex-col items-center" style="background:var(--color-primary-container);border-radius:0.5rem;padding:2vh 3vh;gap:1vh;">
                                    <div class="flex items-center justify-center" style="width:7vh;height:7vh;border-radius:50%;border:2px solid rgba(212,98,43,0.3);background:rgba(34,68,85,0.4);">
                                        <span class="material-symbols-rounded filled icon-vh-md text-primary">person</span>
                                    </div>
                                    <span class="text-vh-base font-body font-bold text-on-surface" x-text="t('discover_future_male')"></span>
                                    <span class="text-vh-2xs font-body uppercase tracking-wider" style="color:rgba(139,158,107,0.6);">Male</span>
                                </div>
                            </button>
                            <button @click="selectGender('female')" class="relative transition-all active:scale-95" style="padding:0.3vh;border-radius:0.75rem;background:linear-gradient(135deg,#D4622B 0%,#5A2810 100%);box-shadow:0 0 25px rgba(212,98,43,0.25);">
                                <div class="flex flex-col items-center" style="background:var(--color-primary-container);border-radius:0.5rem;padding:2vh 3vh;gap:1vh;">
                                    <div class="flex items-center justify-center" style="width:7vh;height:7vh;border-radius:50%;border:2px solid rgba(212,98,43,0.3);background:rgba(34,68,85,0.4);">
                                        <span class="material-symbols-rounded filled icon-vh-md text-primary">face_3</span>
                                    </div>
                                    <span class="text-vh-base font-body font-bold text-on-surface" x-text="t('discover_future_female')"></span>
                                    <span class="text-vh-2xs font-body uppercase tracking-wider" style="color:rgba(139,158,107,0.6);">Female</span>
                                </div>
                            </button>
                        </div>
                    </main>

                    <footer class="section-footer flex flex-col items-center justify-center relative z-10">
                        <button @click="toggleLocale()" class="text-vh-xs transition-all flex items-center" style="color:#8B9E6B;gap:0.5vh;">
                            <span class="material-symbols-rounded icon-vh-xs">language</span>
                            <span x-text="locale==='ar'?'English':'العربية'"></span>
                        </button>
                    </footer>
                    <div class="pyalara-bar"><img src="img/pyalara logo.png" alt="Pyalara" style="height:3.5vh;"></div>
                </div>
            </template>

            <!-- ==================== QUIZ SCREEN ==================== -->
            <template x-if="screen === 'quiz'">
                <div class="flex flex-col" style="height:100%;width:100%;">
                    <div class="section-header flex items-center justify-between" style="padding:0 2vh;direction:ltr;">
                        <div class="flex items-center"><img src="img/4.png" alt="Bosalati AI" style="height:7vh;"></div>
                        <div class="flex items-center" style="gap:2vh;">
                            <!-- Compass -->
                            <div class="relative" style="width:7vh;height:7vh;">
                                <svg class="w-full h-full" viewBox="0 0 100 100" style="transform:rotate(-90deg);">
                                    <circle cx="50" cy="50" r="42" fill="none" stroke="rgba(212,98,43,0.1)" stroke-width="4"/>
                                    <circle cx="50" cy="50" r="42" fill="none" stroke="url(#compassGrad)" stroke-width="4"
                                            stroke-linecap="round"
                                            :stroke-dasharray="2*3.14159*42"
                                            :stroke-dashoffset="2*3.14159*42*(1-(currentQuestion+1)/questions.length)"
                                            style="transition:stroke-dashoffset 0.8s ease-out;"/>
                                    <defs><linearGradient id="compassGrad" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#5A2810"/><stop offset="100%" stop-color="#D4622B"/></linearGradient></defs>
                                </svg>
                                <div class="absolute inset-0 flex items-center justify-center">
                                    <div class="flex items-center justify-center compass-shadow" style="width:5vh;height:5vh;border-radius:50%;background:var(--color-surface-low);">
                                        <span class="material-symbols-rounded text-primary compass-needle" style="font-size:3vh;font-variation-settings:'FILL' 1;" :style="'--needle-deg:'+((currentQuestion+1)/questions.length*360)+'deg'">navigation</span>
                                    </div>
                                </div>
                                <div class="absolute inset-0 rounded-full animate-pulse" style="box-shadow:0 0 15px rgba(212,98,43,0.2);"></div>
                            </div>
                            <div class="flex flex-col">
                                <span class="font-label text-vh-2xs text-primary tracking-widest uppercase"
                                      x-text="locale==='ar'?('السؤال '+(currentQuestion+1)+' من '+questions.length):('Question '+(currentQuestion+1)+' of '+questions.length)"></span>
                            </div>
                        </div>
                    </div>

                    <div class="section-content flex flex-col overflow-hidden" style="padding:1vh 2vh;">
                        <!-- Question Card -->
                        <div class="glass-card text-center shrink-0" style="border-radius:2vh;padding:2.5vh;margin-bottom:1.5vh;">
                            <div class="inline-flex items-center" style="padding:0.4vh 1.5vh;border-radius:9999px;background:rgba(212,98,43,0.1);border:1px solid rgba(212,98,43,0.2);margin-bottom:1vh;">
                                <span class="font-label text-vh-2xs text-primary uppercase tracking-widest"
                                      x-text="locale==='ar'?questions[currentQuestion].category_ar:questions[currentQuestion].category_en"></span>
                            </div>
                            <h2 class="font-body text-vh-2xl font-bold text-on-surface leading-tight"
                                x-text="getQuestionText()"></h2>
                        </div>

                        <!-- Options Grid -->
                        <div class="grid grid-cols-2 overflow-y-auto scroll-hide content-start" style="flex:1;gap:2vh;">
                            <template x-for="(option, i) in questions[currentQuestion].options" :key="i">
                                <button @click="selectAnswer(option)"
                                    :style="(answers[currentQuestion] && answers[currentQuestion].riasec_code === option.riasec_code) ? 'background:rgba(212,98,43,0.08);border:1px solid rgba(212,98,43,0.4);' : 'background:rgba(27,58,75,0.5);border:1px solid transparent;'"
                                    class="w-full h-full flex flex-col items-center justify-center transition-all active:scale-95 neon-glow"
                                    style="gap:1vh;padding:1.5vh;border-radius:1.5vh;">
                                    <div class="flex items-center justify-center shrink-0 overflow-hidden"
                                         :style="(answers[currentQuestion] && answers[currentQuestion].riasec_code === option.riasec_code) ? 'width:5vh;height:5vh;border-radius:0.75rem;background:rgba(212,98,43,0.2);' : 'width:5vh;height:5vh;border-radius:0.75rem;background:rgba(19,42,53,0.8);'">
                                        <span class="material-symbols-rounded" style="font-size:2.5vh;"
                                              :class="(answers[currentQuestion] && answers[currentQuestion].riasec_code === option.riasec_code) ? 'text-primary' : 'text-on-surface-variant'"
                                              x-text="option.icon"></span>
                                    </div>
                                    <span class="font-body font-bold text-vh-sm text-center leading-tight"
                                          :class="(answers[currentQuestion] && answers[currentQuestion].riasec_code === option.riasec_code) ? 'text-primary' : 'text-on-surface'"
                                          x-text="locale==='ar'?option.label_ar:option.label_en"></span>
                                </button>
                            </template>
                        </div>
                    </div>

                    <div class="section-footer flex flex-col justify-end items-center" style="padding:0 2vh 1vh;">
                        <!-- Show Result (last Q only) -->
                        <template x-if="currentQuestion === questions.length - 1 && answers[currentQuestion]">
                            <div style="margin-bottom:1.5vh;">
                                <button @click="calculateResult()"
                                    class="gradient-primary rounded-full flex items-center justify-center transition-all active:scale-95 neon-glow"
                                    style="padding:1.2vh 4vh;font-size:2vh;gap:1vh;">
                                    <span class="material-symbols-rounded text-on-primary" style="font-size:2.5vh;font-variation-settings:'FILL' 1;">auto_awesome</span>
                                    <span class="font-body font-bold text-on-primary" x-text="locale==='ar'?'إظهار النتيجة':'Show Result'"></span>
                                </button>
                            </div>
                        </template>
                        <!-- Nav buttons -->
                        <div class="flex justify-between items-center w-full">
                            <button @click="prevQuestion()" class="flex items-center justify-center transition-all active:scale-95" style="width:6vh;height:6vh;border-radius:50%;background:#D4622B;">
                                <span class="material-symbols-rounded text-white" style="font-size:2.5vh;">arrow_forward</span>
                            </button>
                            <button @click="goTo('home');resetQuiz()" class="flex items-center justify-center transition-all active:scale-95" style="width:6vh;height:6vh;border-radius:50%;background:#D4622B;">
                                <span class="material-symbols-rounded text-white" style="font-size:2.5vh;">home</span>
                            </button>
                        </div>
                    </div>
                    <div class="pyalara-bar"><img src="img/pyalara logo.png" alt="Pyalara" style="height:3.5vh;"></div>
                </div>
            </template>

            <!-- ==================== CAPTURE SCREEN ==================== -->
            <template x-if="screen === 'capture'">
                <div x-data="cameraComponent()" x-init="initCamera()" class="flex flex-col" style="height:100%;width:100%;">
                    <header class="section-header flex items-center justify-between" style="padding:0 2vh;direction:ltr;">
                        <div class="flex items-center"><img src="img/4.png" alt="Bosalati AI" style="height:7vh;"></div>
                        <div class="flex items-center" style="gap:1vh;">
                            <div style="width:1vh;height:1vh;background:#ef4444;border-radius:50%;" class="animate-pulse"></div>
                            <span class="font-label text-vh-2xs uppercase tracking-widest font-bold" style="color:#f87171;">REC</span>
                        </div>
                    </header>

                    <main class="section-content flex flex-col items-center overflow-hidden" style="padding:0.5vh 2vh;">
                        <!-- Career Result -->
                        <div class="text-center shrink-0" style="border:2px solid rgba(212,98,43,0.3);border-radius:1.5vh;padding:1.2vh 3vh;background:rgba(27,58,75,0.6);margin-bottom:2vh;">
                            <p class="text-vh-sm uppercase tracking-widest font-body" style="color:#8B9E6B;"
                               x-text="locale==='ar'?(gender==='female'?'المهنة الأنسب لكِ':'المهنة الأنسب لك'):'Your best-fit career'"></p>
                            <h2 class="gradient-text-primary text-vh-xl font-body font-bold"
                                x-text="locale==='ar'?matchedCareer?.name_ar:matchedCareer?.name_en"></h2>
                        </div>

                        <!-- Camera Viewfinder -->
                        <div class="relative overflow-hidden" style="aspect-ratio:2/3;flex:1;min-height:0;width:85%;border-radius:2vh;background:var(--color-surface-lowest);">
                            <video x-ref="video" autoplay playsinline muted x-show="!photo" class="w-full h-full object-cover" style="transform:scaleX(-1);"></video>
                            <img x-show="photo" :src="photo" class="w-full h-full object-cover" x-cloak>
                            <div class="viewfinder-grid absolute inset-0 z-10 pointer-events-none"></div>
                            <!-- Crosshair -->
                            <div x-show="countdown===0 && !photo" class="absolute inset-0 z-10 pointer-events-none">
                                <div class="absolute" style="top:50%;left:50%;width:0.2vh;height:3vh;background:rgba(255,255,255,0.25);transform:translate(-50%,-50%);"></div>
                                <div class="absolute" style="top:50%;left:50%;width:3vh;height:0.2vh;background:rgba(255,255,255,0.25);transform:translate(-50%,-50%);"></div>
                                <div class="absolute" style="top:50%;left:50%;width:5vh;height:5vh;border-radius:50%;border:1px solid rgba(255,255,255,0.15);transform:translate(-50%,-50%);"></div>
                            </div>
                            <!-- Camera Error -->
                            <div x-show="cameraError" x-cloak class="absolute inset-0 flex flex-col items-center justify-center z-30" style="background:rgba(0,0,0,0.7);padding:3vh;">
                                <span class="material-symbols-rounded text-primary" style="font-size:6vh;margin-bottom:2vh;">videocam_off</span>
                                <p class="text-vh-base text-on-surface text-center font-bold" style="margin-bottom:1vh;" x-text="cameraError"></p>
                                <p class="text-vh-xs text-center" style="color:#8B9E6B;"
                                   x-text="locale==='ar'?'يرجى استخدام HTTPS للوصول إلى الكاميرا':'Please use HTTPS to access the camera'"></p>
                            </div>
                            <!-- Countdown -->
                            <div x-show="countdown > 0" x-cloak class="absolute inset-0 flex justify-center z-30 overflow-hidden"
                                 style="align-items:flex-end;padding-bottom:8vh;background:radial-gradient(circle,rgba(10,21,25,0.5) 0%,rgba(10,21,25,0.3) 100%);">

                                <!-- Particle field (matches web) -->
                                <div class="absolute inset-0 pointer-events-none">
                                    <div class="countdown-particle" style="left:15%;top:25%;width:0.5vh;height:0.5vh;background:#D4622B;animation-delay:0.2s;animation-duration:2.8s;"></div>
                                    <div class="countdown-particle" style="left:72%;top:18%;width:0.3vh;height:0.3vh;background:#E8A250;animation-delay:1.5s;animation-duration:3.2s;"></div>
                                    <div class="countdown-particle" style="left:45%;top:60%;width:0.6vh;height:0.6vh;background:#8B9E6B;animation-delay:0.8s;animation-duration:2.5s;"></div>
                                    <div class="countdown-particle" style="left:28%;top:80%;width:0.4vh;height:0.4vh;background:#3B6B5E;animation-delay:2.1s;animation-duration:3.8s;"></div>

                                <div class="absolute rounded-full animate-pulse" style="width:26vh;height:26vh;background:rgba(212,98,43,0.2);filter:blur(50px);"></div>
                                <div class="relative overflow-hidden flex items-center justify-center" style="background:var(--color-surface-high);border-radius:2rem;border:1px solid rgba(255,255,255,0.05);width:20vh;aspect-ratio:2/3;box-shadow:0 25px 50px -12px rgba(0,0,0,0.25);">
                                    <img :src="generatedImageUrl || capturedPhoto" class="absolute inset-0 w-full h-full object-cover" alt="Career Portrait"/>
                                    <div class="absolute inset-x-0" style="bottom:0;background:linear-gradient(to top,rgba(90,40,16,0.8),transparent);padding:0 0.75rem 1vh;text-align:center;">
                                        <span class="text-vh-2xs font-body font-bold uppercase tracking-widest" style="color:var(--color-on-primary-container);" x-text="matchedCareer?.badge_label"></span>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="flex flex-col justify-center" style="flex:1;gap:1vh;padding:1vh 2vh;">
                            <div class="glass-card border animate-fade-in-up delay-600" style="border-radius:1.5vh;padding:1.5vh;border-color:rgba(255,255,255,0.05);">
                                <div class="flex items-center" style="gap:0.5rem;margin-bottom:0.3vh;">
                                    <span class="material-symbols-rounded filled text-tertiary" style="font-size:2vh;">location_on</span>
                                    <span class="font-body text-vh-2xs uppercase tracking-wider text-on-surface-variant" x-text="locale==='ar'?'فلسطين 2030':'Future Palestine 2030'"></span>
                                </div>
                                <p class="text-vh-xs font-bold text-on-surface font-body" x-text="locale==='ar'?matchedCareer?.palestine_2030_insight_ar:matchedCareer?.palestine_2030_insight_en"></p>
                            </div>
                            <div class="glass-card border animate-fade-in-up delay-800" style="border-radius:1.5vh;padding:1.5vh;border-color:rgba(255,255,255,0.05);">
                                <div class="flex items-center" style="gap:0.5rem;margin-bottom:0.3vh;">
                                    <span class="material-symbols-rounded filled text-primary" style="font-size:2vh;">precision_manufacturing</span>
                                    <span class="font-body text-vh-2xs uppercase tracking-wider text-on-surface-variant" x-text="locale==='ar'?'تأثير الذكاء الاصطناعي':'AI Impact Score'"></span>
                                </div>
                                <p class="text-vh-xs font-bold text-on-surface font-body" x-text="locale==='ar'?matchedCareer?.ai_impact_ar:matchedCareer?.ai_impact_en"></p>
                            </div>
                        </div>
                    </div>

                    <div class="section-footer flex flex-col items-center justify-center animate-fade-in-up delay-800" style="gap:1.5vh;padding:0 2vh;">
                        <button @click="goTo('welcome');resetQuiz()" class="w-full gradient-primary shadow-xl active:scale-95 transition-all flex items-center justify-center text-on-primary font-body font-bold"
                                style="padding:1.5vh 0;font-size:2vh;border-radius:1rem;gap:0.75rem;">
                            <span x-text="locale==='ar'?'ابدأ من جديد':'Start Over'"></span>
                            <span class="material-symbols-rounded filled" style="font-size:2.5vh;">rocket_launch</span>
                        </button>
                        <div class="flex items-center justify-center" style="gap:3vh;">
                            <button @click="goTo('home');resetQuiz()" class="flex items-center transition-all text-vh-2xs uppercase tracking-wider" style="gap:0.25rem;color:#8B9E6B;">
                                <span class="material-symbols-rounded filled text-vh-xs">home</span>
                                <span x-text="locale==='ar'?'الرئيسية':'Home'"></span>
                            </button>
                            <div style="width:1px;height:2vh;background:rgba(255,255,255,0.1);"></div>
                            <button @click="shareImage()" class="flex items-center transition-all text-vh-2xs uppercase tracking-wider" style="gap:0.25rem;color:#8B9E6B;">
                                <span class="material-symbols-rounded filled text-vh-xs">share</span>
                                <span x-text="locale==='ar'?'مشاركة':'Share'"></span>
                            </button>
                        </div>
                    </div>
                    <div class="pyalara-bar"><img src="img/pyalara logo.png" alt="Pyalara" style="height:3.5vh;"></div>
                </div>
            </template>

        </div>
    </div>

    <!-- Debug Log Toggle Button — triple-tap bottom-left corner to open -->
    <div id="debug-toggle"
         onclick="if(window.DebugLog)DebugLog.toggle();"
         style="position:fixed;bottom:0;left:0;width:8vh;height:8vh;z-index:99998;opacity:0;">
    </div>

    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
